services:
  # Database for users and accounting data
  postgres:
    image: postgres:18-alpine
    container_name: nac_postgres
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nac_net

  # Redis for session caching and rate-limiting
  redis:
    image: redis:8-alpine
    container_name: nac_redis
    networks:
      - nac_net

  # FastAPI Policy Engine (Core Logic)
  api:
    build: ./api
    container_name: nac_api
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - nac_net

  # FreeRADIUS 3.2 Server
  freeradius:
    image: freeradius/freeradius-server:latest-3.2
    container_name: nac_radius
    ports:
      - "1812:1812/udp" # Auth
      - "1813:1813/udp" # Acct
    volumes:
      - ./radius/config:/etc/raddb
    depends_on:
      - api
    networks:
      - nac_net

networks:
  nac_net:
    driver: bridge

volumes:
  postgres_data: