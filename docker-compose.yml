
version: '3.8'
services:
  nac_db:
    container_name: nac_postgres
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nac_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nac_redis:
    container_name: nac_redis
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nac_api:
    container_name: nac_api
    build: ./api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      nac_db:
        condition: service_healthy
      nac_redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://nac_admin:nac_pass@nac_db:5432/nac_db
      - REDIS_HOST=nac_redis  
      - REDIS_PORT=6379
    networks:
      - nac_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s  

  nac_radius:
    container_name: nac_radius
    image: freeradius/freeradius-server:latest-3.2
    platform: linux/amd64
    volumes:
      - ./radius/config:/etc/raddb
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    depends_on:
      nac_api:
        condition: service_started 
    networks:
      - nac_net

networks:
  nac_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data: