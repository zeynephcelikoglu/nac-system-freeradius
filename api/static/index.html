<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NAC Monitoring Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    :root {
      --bg-base:    #080c12;
      --bg-surface: #0f1623;
      --bg-raised:  #1a2235;
      --bg-hover:   #1e2a40;
      --border:     #253045;
      --text-primary:   #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted:     #4a5568;
      --accent-blue:  #3b82f6;
      --accent-green: #22c55e;
      --accent-amber: #f59e0b;
      --accent-purple:#a78bfa;
    }

    * { box-sizing: border-box; }

    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.925rem;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      background-color: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem;
    }
    .navbar-brand {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--text-primary) !important;
    }
    .dot-live {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent-green);
      border-radius: 50%;
      margin-right: 6px;
      animation: livePulse 2s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
      50%      { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
    }

    /* ── Stat cards ── */
    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem 1.6rem;
      display: flex;
      align-items: center;
      gap: 1.1rem;
      transition: border-color .2s;
    }
    .stat-card:hover { border-color: #3b4f6e; }
    .stat-icon {
      width: 46px; height: 46px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .si-blue   { background: rgba(59,130,246,.15); }
    .si-green  { background: rgba(34,197, 94,.15); }
    .si-amber  { background: rgba(245,158, 11,.15); }
    .si-purple { background: rgba(167,139,250,.15); }
    .stat-number {
      font-size: 1.85rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 2px;
    }
    .stat-label {
      font-size: 0.72rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.9px;
      font-weight: 500;
    }

    /* ── Cards ── */
    .dash-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .dash-card-header {
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 1.4rem;
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Tables ── */
    .table {
      color: var(--text-primary);
      margin: 0;
    }
    .table thead th {
      background: var(--bg-raised);
      color: var(--text-muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      border-color: var(--border);
      padding: 0.65rem 1.1rem;
    }
    .table tbody td {
      border-color: rgba(37,48,69,.6);
      padding: 0.75rem 1.1rem;
      vertical-align: middle;
    }
    .table tbody tr { transition: background .15s; }
    .table tbody tr:hover td { background: var(--bg-hover); }
    .table tbody tr:last-child td { border-bottom: none; }

    /* ── Username ── */
    .username {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.88rem;
    }

    /* ── Monospace session id ── */
    .session-id {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--bg-raised);
      padding: 2px 7px;
      border-radius: 4px;
    }

    /* ── NAS IP ── */
    .nas-ip {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: #60a5fa;
    }

    /* ── Group badges (outline pastel) ── */
    .grp-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.72rem; font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .grp-admin    { color: #93c5fd; background: rgba(59,130,246,.12); border: 1px solid rgba(59,130,246,.3); }
    .grp-employee { color: #86efac; background: rgba(34,197, 94,.12); border: 1px solid rgba(34,197, 94,.3); }
    .grp-guest    { color: #cbd5e1; background: rgba(148,163,184,.10); border: 1px solid rgba(148,163,184,.25); }

    /* ── VLAN badge ── */
    .vlan-badge {
      font-size: 0.72rem; font-weight: 600;
      color: #a78bfa;
      background: rgba(167,139,250,.1);
      border: 1px solid rgba(167,139,250,.25);
      padding: 2px 9px;
      border-radius: 20px;
    }

    /* ── Status badge ── */
    .status-active {
      font-size: 0.72rem; font-weight: 600;
      color: #86efac;
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.25);
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .status-dot {
      width: 6px; height: 6px;
      background: #22c55e;
      border-radius: 50%;
      animation: softPulse 2.5s ease-in-out infinite;
    }
    @keyframes softPulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .4; }
    }

    /* ── Count badge ── */
    .count-badge {
      font-size: 0.72rem; font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .count-green  { background: rgba(34,197, 94,.15); color: #86efac; border: 1px solid rgba(34,197,94,.25); }
    .count-blue   { background: rgba(59,130,246,.15); color: #93c5fd; border: 1px solid rgba(59,130,246,.25); }

    /* ── Toolbar ── */
    .refresh-btn {
      background: rgba(34,197,94,.15);
      border: 1px solid rgba(34,197,94,.3);
      color: #86efac;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .2s;
    }
    .refresh-btn:hover { background: rgba(34,197,94,.25); }
    .last-updated { font-size: 0.72rem; color: var(--text-muted); }

    /* ── Empty / error state ── */
    .empty-state { color: var(--text-muted); font-size: 0.85rem; padding: 2rem 0; }
    .error-state { color: #f87171; font-size: 0.85rem; padding: 2rem 0; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar mb-4">
  <div class="d-flex align-items-center gap-2">
    <span class="dot-live"></span>
    <span class="navbar-brand">NAC Monitoring Dashboard</span>
  </div>
  <div class="d-flex align-items-center gap-3">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</nav>

<div class="container-fluid px-4">

  <!-- Stat Row -->
  <div class="row g-3 mb-4">
    <div class="col-sm-6 col-xl-3">
      <div class="stat-card">
        <div class="stat-icon si-blue">🟦</div>
        <div>
          <div class="stat-number text-info" id="statSessions">—</div>
          <div class="stat-label">Active Sessions</div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl-3">
      <div class="stat-card">
        <div class="stat-icon si-green">👤</div>
        <div>
          <div class="stat-number" style="color:var(--accent-green)" id="statUsers">—</div>
          <div class="stat-label">Registered Users</div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl-3">
      <div class="stat-card">
        <div class="stat-icon si-amber">🔀</div>
        <div>
          <div class="stat-number" style="color:var(--accent-amber)" id="statVlans">—</div>
          <div class="stat-label">Active VLANs</div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl-3">
      <div class="stat-card">
        <div class="stat-icon si-purple">🏷️</div>
        <div>
          <div class="stat-number" style="color:var(--accent-purple)" id="statGroups">—</div>
          <div class="stat-label">User Groups</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tables Row -->
  <div class="row g-4">

    <!-- Active Sessions -->
    <div class="col-lg-6">
      <div class="dash-card h-100">
        <div class="dash-card-header">
          <span>Active Sessions</span>
          <span class="count-badge count-green" id="sessionCount">0</span>
        </div>
        <table class="table">
          <thead>
            <tr>
              <th>Username</th>
              <th>NAS IP</th>
              <th>Session ID</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="sessionTable">
            <tr><td colspan="4" class="text-center empty-state">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Registered Users -->
    <div class="col-lg-6">
      <div class="dash-card h-100">
        <div class="dash-card-header">
          <span>Registered Users</span>
          <span class="count-badge count-blue" id="userCount">0</span>
        </div>
        <table class="table">
          <thead>
            <tr>
              <th>Username</th>
              <th>Group</th>
              <th>VLAN</th>
            </tr>
          </thead>
          <tbody id="userTable">
            <tr><td colspan="3" class="text-center empty-state">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
  const VLAN_MAP = { admin:"10", employee:"20", guest:"30" };

  function groupBadge(grp) {
    const cls = { admin:"grp-admin", employee:"grp-employee", guest:"grp-guest" }[grp] || "grp-guest";
    return `<span class="grp-badge ${cls}">${grp||"guest"}</span>`;
  }

  async function loadSessions() {
    try {
      const data = await fetch("/sessions/active").then(r => r.json());
      const tbody = document.getElementById("sessionTable");
      document.getElementById("sessionCount").textContent = data.length;
      document.getElementById("statSessions").textContent  = data.length;

      tbody.innerHTML = data.length === 0
        ? '<tr><td colspan="4" class="text-center empty-state">No active sessions</td></tr>'
        : data.map(s => `
            <tr>
              <td><span class="username">${s.username||"—"}</span></td>
              <td><span class="nas-ip">${s.nas_ip||"—"}</span></td>
              <td><span class="session-id">${(s.session_id||"").substring(0,14)}…</span></td>
              <td><span class="status-active"><span class="status-dot"></span>active</span></td>
            </tr>`).join("");
    } catch {
      document.getElementById("sessionTable").innerHTML =
        '<tr><td colspan="4" class="text-center error-state">⚠ Connection error</td></tr>';
    }
  }

  async function loadUsers() {
    try {
      const data = await fetch("/users").then(r => r.json());
      const tbody = document.getElementById("userTable");
      document.getElementById("userCount").textContent = data.length;
      document.getElementById("statUsers").textContent  = data.length;

      const groups = new Set(data.map(u=>u.group).filter(Boolean));
      const vlans  = new Set(data.map(u=>VLAN_MAP[u.group]).filter(Boolean));
      document.getElementById("statGroups").textContent = groups.size;
      document.getElementById("statVlans").textContent  = vlans.size;

      tbody.innerHTML = data.length === 0
        ? '<tr><td colspan="3" class="text-center empty-state">No users found</td></tr>'
        : data.map(u => `
            <tr>
              <td><span class="username">${u.username}</span></td>
              <td>${groupBadge(u.group)}</td>
              <td><span class="vlan-badge">VLAN ${VLAN_MAP[u.group]||"30"}</span></td>
            </tr>`).join("");
    } catch {
      document.getElementById("userTable").innerHTML =
        '<tr><td colspan="3" class="text-center error-state">⚠ Connection error</td></tr>';
    }
  }

  function loadAll() {
    loadSessions();
    loadUsers();
    document.getElementById("lastUpdated").textContent =
      "Updated " + new Date().toLocaleTimeString();
  }

  loadAll();
  setInterval(loadAll, 10000);
</script>
</body>
</html>
